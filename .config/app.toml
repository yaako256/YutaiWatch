# app.toml
# ここに定数設定などを書いていく

# スクレイピング関連
[scraper]
dir_path = "./scraper/"
file_name = "main.py"
python_command = "python3"

# 記録データ関連
[data]
dir_path = "./data/"

# Discord関連の定数定義
[discord]
# webhookは.envで上書きする!
notify_webhook = ["WEBHOOK_URL"]
error_webhook = ["WEBHOOK_URL"]



